name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run validate:distribution
      - run: pnpm test

      - name: Self-certify (dogfood)
        run: node dist/index.js .

      - name: Smoke-test the candidate Action
        uses: ./action
        with:
          out-dir: .cejel-action

      - name: Verify candidate Action artifacts
        run: |
          test -s .cejel-action/report.json
          test -s .cejel-action/certificate.html
          test -s .cejel-action/summary.json

      - name: Upload candidate Action certificate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cejel-action-certificate
          path: .cejel-action/
          include-hidden-files: true
          if-no-files-found: error

      - name: Build Docker image
        run: docker build --tag cejel:ci .

      - name: Smoke-test Docker CLI and MCP ownership label
        run: |
          test "$(docker run --rm cejel:ci --version)" = "$(node -p "require('./package.json').version")"
          docker run --rm cejel:ci --help | grep -q '^cejel'
          test "$(docker run --rm --entrypoint cejel cejel:ci --version)" = "$(node -p "require('./package.json').version")"
          docker run --rm cejel:ci
          test "$(docker inspect cejel:ci --format '{{ index .Config.Labels "io.modelcontextprotocol.server.name" }}')" = "io.github.BargLabs/cejel"
