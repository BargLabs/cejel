name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run validate:distribution
      - run: pnpm test

      - name: Self-certify (dogfood)
        run: node dist/index.js .

      - name: Smoke-test the advertised released Action
        uses: BargLabs/cejel/action@v0.1.7
        with:
          out-dir: .cejel-action

      - name: Upload trust certificate
        uses: actions/upload-artifact@v4
        with:
          name: cejel-certificate
          path: .cejel/

      - name: Build Docker image
        run: docker build --tag cejel:ci .

      - name: Smoke-test Docker CLI and MCP ownership label
        run: |
          test "$(docker run --rm cejel:ci --version)" = "$(node -p "require('./package.json').version")"
          docker run --rm cejel:ci --help | grep -q '^cejel'
          test "$(docker run --rm --entrypoint cejel cejel:ci --version)" = "$(node -p "require('./package.json').version")"
          docker run --rm cejel:ci
          test "$(docker inspect cejel:ci --format '{{ index .Config.Labels "io.modelcontextprotocol.server.name" }}')" = "io.github.BargLabs/cejel"
