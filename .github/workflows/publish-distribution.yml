name: Publish OCI image and MCP Registry metadata

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published release tag; must equal v<package version>
        required: true
        type: string
      publish_mcp_registry:
        description: Publish server.json to the Official MCP Registry after the OCI image is available
        required: true
        default: false
        type: boolean

concurrency:
  group: cejel-distribution-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/barglabs/cejel

jobs:
  preflight:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Require matching release, npm package, and registry metadata
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$version"
          test "$(npm view "@cejel/cejel@$version" version)" = "$version"
          test "$(npm view "@cejel/cejel@$version" mcpName)" = "io.github.BargLabs/cejel"
          pnpm install --frozen-lockfile
          pnpm run validate:distribution

  publish-oci:
    needs: preflight
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags and labels
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.release_tag }}
            type=raw,value=latest

      - name: Build and publish multi-platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: VERSION=${{ steps.metadata.outputs.version }}
          sbom: true
          provenance: mode=max

      - name: Create signed image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-mcp-registry:
    needs: publish-oci
    if: ${{ inputs.publish_mcp_registry }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout validated registry metadata
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Install the Official MCP Registry publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Validate registry metadata
        run: node scripts/validate-distribution-metadata.mjs

      - name: Publish server metadata
        run: ./mcp-publisher publish
