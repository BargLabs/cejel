name: Publish OCI image and MCP Registry metadata

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published release tag; must equal v<package version>
        required: true
        type: string
      publish_mcp_registry:
        description: Publish server.json to the Official MCP Registry after the OCI image is available
        required: true
        default: false
        type: boolean

concurrency:
  group: cejel-distribution-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/barglabs/cejel

jobs:
  preflight:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: Require matching release, npm package, and registry metadata
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$version"
          test "$(npm view "@cejel/cejel@$version" version)" = "$version"
          test "$(npm view "@cejel/cejel@$version" mcpName)" = "io.github.BargLabs/cejel"
          pnpm install --frozen-lockfile
          pnpm run validate:distribution

  publish-oci:
    needs: preflight
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Generate image tags and labels
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.release_tag }}
            type=raw,value=latest

      - name: Build and publish multi-platform image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: VERSION=${{ steps.metadata.outputs.version }}
          sbom: true
          provenance: mode=max

      - name: Create signed image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-mcp-registry:
    needs: publish-oci
    if: ${{ inputs.publish_mcp_registry }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout validated registry metadata
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install the Official MCP Registry publisher
        env:
          MCP_PUBLISHER_VERSION: v1.8.0
          MCP_PUBLISHER_LINUX_AMD64_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
          MCP_PUBLISHER_LINUX_ARM64_SHA256: c978982c60e1b4903a976de090f04dc4fac4a320daa50704fcad2dbc93433d62
        run: |
          architecture="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          asset="mcp-publisher_linux_${architecture}.tar.gz"
          case "$architecture" in
            amd64) expected_sha256="$MCP_PUBLISHER_LINUX_AMD64_SHA256" ;;
            arm64) expected_sha256="$MCP_PUBLISHER_LINUX_ARM64_SHA256" ;;
            *) echo "Unsupported MCP publisher architecture: $architecture" >&2; exit 1 ;;
          esac
          curl --fail --location --proto '=https' --tlsv1.2 \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${asset}" \
            --output "$asset"
          printf '%s  %s\n' "$expected_sha256" "$asset" | sha256sum --check -
          tar -xzf "$asset" mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Validate registry metadata
        run: node scripts/validate-distribution-metadata.mjs

      - name: Publish server metadata
        run: ./mcp-publisher publish
