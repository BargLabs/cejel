name: 'Cejel'
description: >-
  Score this repository's engineering-trust signals with Cejel offline and post the result to
  the job summary.
author: 'Barg Labs Studios'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  repo-path:
    description: 'Path to the repository to score. Defaults to $GITHUB_WORKSPACE (the checkout).'
    required: false
    default: ''
  min-score:
    description: >-
      Optional minimum overall score (0-4). Fails this step if the scored repo is below
      the threshold. Leave empty to never fail the check.
    required: false
    default: ''
  out-dir:
    description: 'Directory to write the JSON report, HTML certificate, and badge artifacts.'
    required: false
    default: '.cejel'

outputs:
  score:
    description: 'Overall Cejel trust score (0.0-4.0).'
    value: ${{ steps.cejel-run.outputs.score }}
  verdict:
    description: 'Verdict label (Verified / Conditional / At risk / Unverified).'
    value: ${{ steps.cejel-run.outputs.verdict }}

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 9.0.0

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install dependencies
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        pnpm install --frozen-lockfile

    - name: Build Cejel
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        pnpm run build

    # repo-path and out-dir remain relative to the calling workflow's workspace.
    - name: Run Cejel (offline scoring — no network calls, no signup)
      id: cejel-run
      shell: bash
      run: node "${{ github.action_path }}/action/run.mjs"
      env:
        WITAN_REPO_PATH: ${{ inputs.repo-path }}
        WITAN_MIN_SCORE: ${{ inputs.min-score }}
        WITAN_OUT_DIR: ${{ inputs.out-dir }}
